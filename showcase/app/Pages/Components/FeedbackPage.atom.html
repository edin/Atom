<section class="story-header">
    <div>
        <h1>Feedback</h1>
        <p>Feedback groups components that communicate state, validation, empty states, and user-facing messages.</p>
    </div>
    <Badge>Category</Badge>
</section>

<ComponentExample title="Feedback family" description="Primitive pages document each component in detail; category pages can later show real workflows.">
    <Inline gap="sm">
        <Button href="/components/alerts" atom:navigate>Alerts</Button>
        <Button href="/components/badges" variant="ghost" atom:navigate>Badges</Button>
        <Button href="/components/feedback" variant="ghost" atom:navigate>Toasts</Button>
        <Button href="/components/feedback" variant="ghost" atom:navigate>Snack bars</Button>
    </Inline>
</ComponentExample>

<ComponentExample title="Toast" description="Toast renders fixed-position feedback and can be controlled by page actions.">
    <Stack gap="sm">
        <Inline gap="sm">
            <Button atom:action="showToast('success')">Success toast</Button>
            <Button variant="warning" atom:action="showToast('warning')">Warning toast</Button>
            <Button variant="danger" atom:action="showToast('danger')">Danger toast</Button>
        </Inline>

        <Toast :model="$this->toast">
            <Toast.Actions>
                <Button size="sm" variant="ghost" atom:action="toast.close()">Dismiss</Button>
            </Toast.Actions>
        </Toast>
    </Stack>
</ComponentExample>

<ComponentExample title="Snack bar" description="SnackBar is compact feedback for short-lived actions, usually with one optional action.">
    <Stack gap="sm">
        <Inline gap="sm">
            <Button atom:action="showSnackBar('success')">Saved snack bar</Button>
            <Button variant="warning" atom:action="showSnackBar('warning')">Warning snack bar</Button>
            <Button variant="danger" atom:action="showSnackBar('danger')">Deleted snack bar</Button>
        </Inline>

        <SnackBar>
            <SnackBar.Actions>
                <Button size="sm" variant="ghost" atom:action="clearFlash">Undo</Button>
            </SnackBar.Actions>
        </SnackBar>
    </Stack>
</ComponentExample>

<ComponentExample title="Workflow sketch" description="This page can become a combined feedback pattern page.">
    <Stack gap="sm">
        <Alert title="Article saved" description="The article was saved as draft." variant="success" />
        <Inline gap="sm">
            <Badge variant="success">Saved</Badge>
            <Badge variant="neutral">Draft</Badge>
        </Inline>
    </Stack>
</ComponentExample>
