<section class="story-header">
    <div>
        <h1>Alerts</h1>
        <p>Alerts communicate status, warnings, and short contextual messages.</p>
    </div>
    <Badge>Primitive</Badge>
</section>

<Stack gap="md">
    <ComponentExample title="Basic alerts" description="Use semantic variants for common status messages.">
        <Stack gap="sm">
            <Alert variant="neutral" icon="lucide:info">Neutral alert</Alert>
            <Alert variant="info" icon="lucide:circle-alert">Info alert</Alert>
            <Alert variant="success" icon="lucide:circle-check">Success alert</Alert>
            <Alert variant="warning" icon="lucide:triangle-alert">Warning alert</Alert>
            <Alert variant="danger" icon="lucide:circle-x">Danger alert</Alert>
        </Stack>
    </ComponentExample>

    <ComponentExample title="Appearances" description="Use solid, soft, outline, or ghost treatments depending on emphasis.">
        <Stack gap="sm">
            <Alert variant="success" appearance="">Solid alert</Alert>
            <Alert variant="success" appearance="soft">Soft alert</Alert>
            <Alert variant="success" appearance="outline">Outline alert</Alert>
            <Alert variant="success" appearance="ghost">Ghost alert</Alert>
        </Stack>
    </ComponentExample>

    <ComponentExample title="Title and description" description="Title and description give the alert a richer information shape.">
        <Alert title="You have 10 messages" description="Open your inbox when you have a moment." variant="info" icon="fa-solid fa-envelope" />
    </ComponentExample>

    <ComponentExample title="Actions" description="Actions are passed as a named fragment.">
        <Alert title="Review changes" description="This article has unpublished edits." variant="warning" appearance="outline" icon="lucide:git-pull-request-arrow">
            <Alert.Actions>
                <Button size="sm" appearance="soft">Review</Button>
                <Button size="sm" variant="ghost">Dismiss</Button>
            </Alert.Actions>
        </Alert>
    </ComponentExample>

    <ComponentExample title="Sizes" description="Alerts support sm, default, and lg sizes.">
        <Stack gap="sm">
            <Alert size="sm" variant="info">Small alert</Alert>
            <Alert variant="info">Default alert</Alert>
            <Alert size="lg" variant="info">Large alert</Alert>
        </Stack>
    </ComponentExample>
</Stack>
