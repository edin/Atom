<section class="story-header">
    <div>
        <h1>Forms</h1>
        <p>Form components can bind directly to page state or receive a model from the parent form.</p>
    </div>
    <Badge>Model binding</Badge>
</section>

<Stack gap="md">
    <ComponentExample
        title="Form model"
        description="The form passes its model into child fields, so each field can read values without prop drilling."
    >
        <Form submit="submit" :model="$this->form">
            <ValidationSummary title="Please fix these fields" only="title,summary" />

            <Toast>
                <Toast.Actions>
                    <Button size="sm" variant="ghost" atom:action="clearFlash">Dismiss</Button>
                </Toast.Actions>
            </Toast>

            <HiddenField name="categoryId" />

            <FormSection title="Content" description="Fields inside a form can be grouped without custom layout CSS.">
                <TextField label="Title" name="title" help="Use a concise title that will fit in table rows." maxlength="80" />

                <TextField label="Summary" name="summary" help="Shown in cards, previews, and search results." maxlength="160" />
            </FormSection>

            <FormSection title="Publishing">
                <FormRow>
                    <SelectField
                        label="Category"
                        name="categoryId"
                        help="The selected category is hydrated into the form model."
                        optionValue="id"
                        optionText="name"
                        :options="$this->categories"
                    />

                    <CheckField id="form-published" label="Published" name="published" help="Unchecked articles stay as drafts." />
                </FormRow>

                <RadioField
                    label="Visibility"
                    name="visibility"
                    orientation="horizontal"
                    help="Choose who can discover this article."
                    :options="$this->visibilityOptions"
                />

                <SwitchField label="Feature on home page" name="featured" help="Featured articles appear in the primary feed." />
            </FormSection>

            <FormActions>
                <Button type="submit">Submit</Button>
                <Button type="button" variant="ghost">Cancel</Button>
            </FormActions>
        </Form>
    </ComponentExample>

    <ComponentExample
        title="Standalone fields"
        description="Fields can also bind to ordinary page properties when a separate model would be unnecessary."
    >
        <Stack gap="sm">
            <TextField label="Page title" name="pageTitle" />
            <TextAreaField id="standalone-summary" label="Notes" name="summary" help="This field reads directly from a page property." />
            <CheckField id="standalone-enabled" label="Enabled" name="published" />
            <SwitchField id="standalone-pinned" label="Pinned" name="published" />
        </Stack>
    </ComponentExample>
</Stack>
