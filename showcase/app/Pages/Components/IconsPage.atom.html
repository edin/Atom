<section class="story-header">
    <div>
        <h1>Icons</h1>
        <p>Icon renders a plain glyph by default and can opt into a soft frame.</p>
    </div>
    <Badge>Primitive</Badge>
</section>

<Stack gap="md">
    <ComponentExample title="Lucide" description="Lucide icons are bundled with Atom and render from the lucide:name syntax.">
        <Inline gap="sm">
            <Icon icon="lucide:file-text" />
            <Icon icon="lucide:square-pen" variant="secondary" />
            <Icon icon="lucide:chart-line" variant="success" />
            <Icon icon="lucide:triangle-alert" variant="warning" />
            <Icon icon="lucide:trash" variant="danger" />
        </Inline>
    </ComponentExample>

    <ComponentExample title="Font Awesome" description="Use icon classes when the app has loaded a font icon stylesheet.">
        <Inline gap="sm">
            <Icon icon="fa-solid fa-file-lines" />
            <Icon icon="fa-solid fa-pen-to-square" variant="secondary" />
            <Icon icon="fa-solid fa-chart-line" variant="success" />
            <Icon icon="fa-solid fa-triangle-exclamation" variant="warning" />
            <Icon icon="fa-solid fa-trash" variant="danger" />
        </Inline>
    </ComponentExample>

    <ComponentExample title="Sizes" description="Icons support sm, default, and lg sizes.">
        <Inline gap="sm" align="center">
            <Icon icon="fa-solid fa-house" size="sm" />
            <Icon icon="fa-solid fa-house" />
            <Icon icon="fa-solid fa-house" size="lg" />
        </Inline>
    </ComponentExample>

    <ComponentExample title="Text fallback" description="Text content is useful for initials or compact status symbols.">
        <Inline gap="sm">
            <Icon>A</Icon>
            <Icon variant="secondary">D</Icon>
            <Icon variant="warning">!</Icon>
        </Inline>
    </ComponentExample>

    <ComponentExample title="Soft frame" description="Use appearance=soft when an icon needs its own surface.">
        <Inline gap="sm" align="center">
            <Icon icon="lucide:file-text" appearance="soft" />
            <Icon icon="lucide:chart-line" variant="success" appearance="soft" />
            <Icon icon="lucide:triangle-alert" variant="warning" appearance="soft" />
            <Icon icon="lucide:trash" variant="danger" appearance="soft" />
        </Inline>
    </ComponentExample>

    <ComponentExample title="Aliased SVG icon" description="Aliased SVG files use the same icon property and are embedded directly into the output.">
        <Inline gap="sm">
            <Icon icon="@app/Resources/icons/article.svg" />
            <Icon icon="@app/Resources/icons/chart.svg" variant="success" />
            <Icon icon="@app/Resources/icons/comment.svg" variant="secondary" />
            <Icon icon="@app/Resources/icons/warning.svg" variant="warning" />
            <Icon icon="@app/Resources/icons/atom.svg" size="lg" />
        </Inline>
    </ComponentExample>

    <ComponentExample title="Public image icon" description="Public icon paths render as image tags with the same icon API.">
        <Inline gap="sm">
            <Icon icon="/icons/orbit.svg" />
            <Icon icon="/icons/orbit.svg" variant="secondary" />
        </Inline>
    </ComponentExample>

    <ComponentExample title="Inside stats" description="Stats owns placement while Icon owns the visual icon surface.">
        <div class="component-grid">
            <Stats label="Articles" value="48" description="Published" icon="@app/Resources/icons/article.svg" />

            <Stats label="Views" value="12.4k" description="Last 7 days" trend="+8%" icon="fa-solid fa-chart-line" />

            <Stats label="Warnings" value="3" description="Need attention">
                <Stats.Icon>
                    <Icon icon="@app/Resources/icons/warning.svg" variant="warning" appearance="soft" />
                </Stats.Icon>
            </Stats>
        </div>
    </ComponentExample>
</Stack>
