<section class="story-header">
    <div>
        <h1>Layout</h1>
        <p>Layout helpers provide predictable spacing and alignment without custom wrappers.</p>
    </div>
    <Badge>Primitive</Badge>
</section>

<Stack gap="md">
    <ComponentExample title="App shell" description="AppShell composes a sidebar, header, and main content area for admin-style pages.">
        <AppShell title="Dashboard">
            <AppShell.Sidebar>
                <Sidebar brand="Atom Admin" href="/" current="auto">
                    <SidebarGroup label="Content">
                        <SidebarItem href="/components" match="prefix" icon="@app/Resources/icons/article.svg">Components</SidebarItem>
                        <SidebarItem href="/components/data" icon="@app/Resources/icons/comment.svg">Comments</SidebarItem>
                    </SidebarGroup>

                    <SidebarGroup label="Insights">
                        <SidebarItem href="/components/icons" icon="@app/Resources/icons/chart.svg">Analytics</SidebarItem>
                        <SidebarItem href="/components/dialogs" icon="@app/Resources/icons/warning.svg">Alerts</SidebarItem>
                    </SidebarGroup>

                    <Sidebar.Footer>
                        <Badge variant="success">Online</Badge>
                    </Sidebar.Footer>
                </Sidebar>
            </AppShell.Sidebar>

            <Stack gap="md">
                <PageHeader title="Articles" description="Manage publishing workflow and recent activity.">
                    <PageHeader.Actions>
                        <Button>New article</Button>
                    </PageHeader.Actions>
                </PageHeader>

                <div class="component-grid">
                    <Stats label="Published" value="48" icon="@app/Resources/icons/article.svg" />
                    <Stats label="Views" value="12.4k" trend="+8%" icon="@app/Resources/icons/chart.svg" />
                </div>
            </Stack>
        </AppShell>
    </ComponentExample>

    <ComponentExample title="Split view" description="SplitView keeps the primary content visible while a right pane handles editing or details.">
        <SplitView :model="$this->editor" sideWidth="360px">
            <Panel title="Articles" description="Clicking edit in a real page can open the side pane.">
                <Stack gap="sm">
                    <Inline justify="between" align="center">
                        <span>Building an Atom admin</span>
                        <Button size="sm" appearance="soft" atom:action="editor.open(1)">Edit</Button>
                    </Inline>

                    <Inline justify="between" align="center">
                        <span>Component showcase notes</span>
                        <Button size="sm" appearance="soft" atom:action="editor.open(2)">Edit</Button>
                    </Inline>
                </Stack>
            </Panel>

            <SplitView.Side>
                <Panel title="Edit article" description="Side panes are regular fragments, so forms work here too.">
                    <Stack gap="sm">
                        <TextField label="Title" name="title" value="Article {{ $this->editor->value }}" />
                        <TextAreaField label="Summary" name="summary" value="A compact editor that does not hide the table." />
                        <FormActions align="end">
                            <Button variant="ghost" atom:action="editor.close()">Cancel</Button>
                            <Button>Save</Button>
                        </FormActions>
                    </Stack>
                </Panel>
            </SplitView.Side>
        </SplitView>
    </ComponentExample>

    <ComponentExample title="Page header" description="PageHeader gives list and editor pages a consistent title, description, and action area.">
        <PageHeader title="Articles" description="Manage blog content and publishing state.">
            <PageHeader.Actions>
                <Button>New article</Button>
            </PageHeader.Actions>
        </PageHeader>
    </ComponentExample>

    <ComponentExample title="Toolbar" description="Toolbar groups filters, search inputs, and page-level commands.">
        <Toolbar gap="sm">
            <Toolbar.Start>
                <TextInput name="search" placeholder="Search articles..." />
                <Button appearance="soft" icon="fa-solid fa-magnifying-glass">Search</Button>
            </Toolbar.Start>

            <Toolbar.End>
                <ButtonGroup>
                    <Button shape="square" icon="fa-solid fa-list" aria-label="List view" />
                    <Button shape="square" icon="fa-solid fa-table-cells" aria-label="Table view" />
                </ButtonGroup>

                <Button variant="primary" icon="fa-solid fa-plus">New article</Button>
            </Toolbar.End>
        </Toolbar>
    </ComponentExample>

    <ComponentExample title="Empty state" description="EmptyState gives blank lists a useful action instead of a dead end.">
        <EmptyState title="No articles yet" description="Create the first article to start building the blog.">
            <EmptyState.Actions>
                <Button>New article</Button>
            </EmptyState.Actions>
        </EmptyState>
    </ComponentExample>

    <ComponentExample title="Stack and Inline" description="Stack and Inline stay as low-level composition helpers.">
        <Panel title="Panel">
            <Inline gap="sm" align="center" justify="between">
                <span>Left content</span>
                <Button variant="ghost">Action</Button>
            </Inline>
        </Panel>
    </ComponentExample>
</Stack>
