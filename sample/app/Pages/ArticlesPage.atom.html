<div class="toolbar">
    <div>
        <h1>Articles</h1>
        <p>Loaded through <code>DbSelect::with("category")</code>.</p>
    </div>
    <a class="button" href="/articles/new">New article</a>
</div>

<Table :items="$this->articles">
    <Column title="Article">
        <a href="/articles/{{ $item->id }}">{{ $item->title }}</a>
        <p class="table-summary">{{ $item->summary }}</p>
    </Column>

    <Column title="Category">
        <span class="pill">{{ $item->category?->name ?? "Uncategorized" }}</span>
    </Column>

    <Column title="Published">
        {{ $item->createdAt->format("M j, Y H:i") }}
    </Column>
</Table>
