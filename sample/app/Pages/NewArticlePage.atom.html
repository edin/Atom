<div class="toolbar">
    <div>
        <h1>New article</h1>
        <p>A tiny POST flow using page input binding, validation, and response redirects.</p>
    </div>
</div>

<Form submit="create">
    <ValidationSummary />

    <SelectField
        label="Category"
        name="category_id"
        bind="categoryId"
        optionValue="id"
        optionText="name"
        :options="$this->categories"
    />

    <TextField label="Title" name="titleInput" maxlength="120" />

    <TextField label="Summary" name="summary" maxlength="220" />

    <TextAreaField label="Body" name="body" />

    <Button type="submit">Publish</Button>
</Form>
