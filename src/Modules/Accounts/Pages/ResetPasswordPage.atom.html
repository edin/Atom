<Accounts.Panel
    :title="$this->title"
    description="Choose a new password for your account."
>
    <Accounts.Error :message="$this->error" />

    <form method="post" action="{{ $this->action }}" class="accounts-form">
        <input type="hidden" name="_token" value="{{ $this->csrfToken }}">
        <input type="hidden" name="_action" value="resetPassword">
        <input type="hidden" name="login" value="{{ $this->login }}">
        <input type="hidden" name="token" value="{{ $this->token }}">

        <Accounts.Field
            label="New password"
            name="password"
            type="password"
            autocomplete="new-password"
            required
            autofocus
        />

        <Accounts.Field
            label="Confirm password"
            name="password_confirmation"
            type="password"
            autocomplete="new-password"
            required
        />

        <Accounts.Button>Reset password</Accounts.Button>
    </form>

    <nav class="accounts-links accounts-links--centered" aria-label="Account navigation">
        <a href="{{ $this->loginUrl }}">Back to sign in</a>
    </nav>
</Accounts.Panel>
