<Accounts.Panel
    :title="$this->title"
    description="Enter your email and we will send password reset instructions."
>
    <Accounts.Error :message="$this->error" />
    <Accounts.Message :message="$this->message" />

    <form method="post" action="{{ $this->action }}" class="accounts-form">
        <input type="hidden" name="_token" value="{{ $this->csrfToken }}">
        <input type="hidden" name="_action" value="sendResetLink">

        <Accounts.Field
            label="Email"
            name="login"
            type="email"
            :value="$this->login"
            autocomplete="email"
            required
            autofocus
        />

        <Accounts.Button>Send reset link</Accounts.Button>
    </form>

    <nav class="accounts-links accounts-links--centered" aria-label="Account navigation">
        <a href="{{ $this->loginUrl }}">Back to sign in</a>
    </nav>
</Accounts.Panel>
